<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script>
      (function() {
        var tg = window.Telegram?.WebApp;
        
        // ── 安全区适配 ──
        function applySafeArea() {
          if (!tg) return;
          const top = (tg.safeAreaInset?.top || 0) + (tg.contentSafeAreaInset?.top || 0);
          const bottom = (tg.safeAreaInset?.bottom || 0) + (tg.contentSafeAreaInset?.bottom || 0);
          
          document.documentElement.style.setProperty("--safe-top", Math.max(top, 0) + "px");
          document.documentElement.style.setProperty("--safe-bottom", Math.max(bottom, 0) + "px");
        }

        // ── 初始化 ──
        async function init() {
          if (tg) {
            try { tg.ready(); } catch (_) {}
            
            // 顺手配置防下拉和状态栏颜色
            try {
              if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
              if (tg.setHeaderColor) tg.setHeaderColor(tg.colorScheme === 'dark' ? '#111827' : '#ffffff');
            } catch (_) {}

            try {
              if (typeof tg.requestFullscreen === "function") {
                tg.requestFullscreen()
                  .then(function() { applySafeArea(); })
                  .catch(function() { try { tg.expand(); } catch (_) {} applySafeArea(); });
              } else {
                try { tg.expand(); } catch (_) {}
              }
            } catch (_) {
              try { tg.expand(); } catch (__) {}
            }
            
            applySafeArea();
            
            try {
              tg.onEvent?.("fullscreenChanged", applySafeArea);
              tg.onEvent?.("safeAreaChanged", applySafeArea);
              tg.onEvent?.("contentSafeAreaChanged", applySafeArea);
              tg.onEvent?.("themeChanged", function() {
                if (tg.setHeaderColor) tg.setHeaderColor(tg.colorScheme === 'dark' ? '#111827' : '#ffffff');
              });
            } catch (_) {}
          }
        }
        
        init();
      })();
    </script>

    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
      var vConsole = new window.VConsole();
    </script>
    
    <title>Family Points</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
